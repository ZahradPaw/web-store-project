server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Кеширование статики
    location /static {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
