services:
  # Nginx reverse proxy  
  nginx:
    image: nginx:alpine
    volumes:
      - ./backend/static_files:/app/backend/static_files
      - ./backend/media:/app/backend/media
      - ./logs:/app/logs
      - ./nginx:/etc/nginx/conf.d
      - frontend_build:/app/frontend
    expose:
      - 8088
    ports:
      - "80:8088"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app-network

  # PostgreSQL DB
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Backend
  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn -c gunicorn.py backend.wsgi"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  # React frontend
  frontend:
    build: ./frontend
    volumes:
      - frontend_build:/app/frontend/build
    networks:
      - app-network

volumes:
  postgres_data:
  frontend_build:

networks:
  app-network:
    driver: bridge
    